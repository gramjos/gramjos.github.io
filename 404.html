<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Parse the URL path, and redirect to the index.html with the path as a query parameter
      var path = location.pathname;
      location.replace('/index.html?path=' + path);
    </script>
  </head>
  <body>
  </body>
</html>
