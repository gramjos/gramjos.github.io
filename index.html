<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title> G. Doc. </title>
	<script src="js/app.js"></script>
	<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@marimo-team/marimo-snippets@1"></script>
</head>
<body>
<h1>Here Time</h1>
<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Clients</a>
  <a href="#">Contact</a>
</div>
<div id="main">
  <button class="openbtn" onclick="openNav()">☰ Open Sidebar</button>
  <h2>Collapsed Sidebar</h2>
  <p>Click on the hamburger menu/bar icon to open the sidebar, and push this content to the right.</p>
</div>
<div>
<marimo-iframe>
```python
import marimo as mo
```
```python
slider = mo.ui.slider(1, 10)
slider
```

```python
slider.value * "🍃"
```
</marimo-iframe>
</div>

<script>
/* Navigation functions use CSS custom properties for consistent styling */
function openNav() {
  // Get the sidebar width from CSS custom property
  const sidebarWidth = getComputedStyle(document.documentElement).getPropertyValue('--sidebar-expanded-width');
  document.getElementById("mySidebar").style.width = sidebarWidth;
  document.getElementById("main").style.marginLeft = sidebarWidth;
}

function closeNav() {
  // Get the collapsed width from CSS custom property  
  const collapsedWidth = getComputedStyle(document.documentElement).getPropertyValue('--sidebar-collapsed-width');
  document.getElementById("mySidebar").style.width = collapsedWidth;
  document.getElementById("main").style.marginLeft = collapsedWidth;
}
</script>
</body>
</html>
