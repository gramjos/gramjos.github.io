<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BNSF Rail Network - Interactive Map</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Loading Indicator -->
    <div id="loading" class="loading">Loading BNSF Rail Network...</div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Floating Action Button - Attribute Table -->
    <button
      id="attr-fab"
      onclick="toggleAttrTable()"
      title="Open Attribute Table"
    >
      🗄️
    </button>

    <!-- Floating Action Button - Charts -->
    <button
      id="charts-fab"
      onclick="toggleChartsPanel()"
      title="Open Charts Panel"
    >
      📈
    </button>

    <!-- Floating Action Button - Info -->
    <button
      id="info-fab"
      onclick="toggleInfoModal()"
      title="How to use this website"
    >
      ℹ️
    </button>

    <!-- Info Modal Placeholder -->
    <div id="info-modal-placeholder"></div>

    <!-- Attribute Table Panel -->
    <div id="attr-table-panel">
      <div class="table-header">
        <h3>
          BNSF Rail Network Attribute Table (<span id="feature-count">0</span>
          features)
        </h3>
        <button class="close-btn" onclick="toggleAttrTable()">Close ✕</button>
      </div>

      <input
        type="text"
        id="search-box"
        placeholder="Search table..."
        onkeyup="filterTable()"
      />

      <div style="overflow: auto; height: calc(100% - 120px)">
        <table id="data-table">
          <thead>
            <tr>
              <th onclick="sortTable(0)">FRAARCID ▼</th>
              <th onclick="sortTable(1)">STATEAB ▼</th>
              <th onclick="sortTable(2)">CNTYFIPS ▼</th>
              <th onclick="sortTable(3)">RROWNER1 ▼</th>
              <th onclick="sortTable(4)">TRKRGHTS1 ▼</th>
              <th onclick="sortTable(5)">DIVISION ▼</th>
              <th onclick="sortTable(6)">BRANCH ▼</th>
              <th onclick="sortTable(7)">TRACKS ▼</th>
              <th onclick="sortTable(8)">MILES ▼</th>
              <th onclick="sortTable(9)">NET ▼</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Charts Panel -->
    <div id="charts-panel">
      <div class="panel-header">
        <h3>BNSF Rail Network Data Visualizations</h3>
        <button class="close-btn" onclick="toggleChartsPanel()">Close ✕</button>
      </div>

      <div class="charts-container">
        <div class="chart-wrapper">
          <div id="state-chart" class="chart"></div>
        </div>
      </div>
    </div>

    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Modal Info Module -->
    <script src="js/modal-info.js"></script>

    <!-- Table Resize Module -->
    <script src="js/table-resize.js"></script>

    <!-- Charts Panel Module -->
    <script src="js/charts-panel.js"></script>

    <!-- Table Interactions Module -->
    <script src="js/table-interactions.js"></script>

    <!-- Application Logic -->
    <script src="js/app.js"></script>
  </body>
</html>
